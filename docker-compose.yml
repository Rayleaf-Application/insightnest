services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insightnest_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      MIX_ENV: dev
      DATABASE_URL: postgres://postgres:postgres@db:5432/insightnest_dev
      DB_HOST: db
      SECRET_KEY_BASE: "dev_secret_key_base_at_least_64_chars_long_replace_in_prod_aaaa"
      GUARDIAN_SECRET_KEY: "dev_guardian_secret_change_in_prod"
      PHX_HOST: localhost
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - deps_cache:/app/deps
      - build_cache:/app/_build
    depends_on:
      db:
        condition: service_healthy
    command: mix phx.server

volumes:
  postgres_data:
  deps_cache:
  build_cache: