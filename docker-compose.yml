# insightnest/docker-compose.yml
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insightnest_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - insightnest_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    network_mode: pasta

volumes:
  insightnest_postgres:
