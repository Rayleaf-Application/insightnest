services:
  - type: web
    name: insightnest
    env: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: 4000
      - key: POOL_SIZE
        value: 5

      # Set this to your Render service domain after first deploy, e.g. insightnest.onrender.com
      - key: PHX_HOST
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: insightnest-db
          property: connectionString

      - key: SECRET_KEY_BASE
        generateValue: true
      - key: GUARDIAN_SECRET_KEY
        generateValue: true
      - key: LIVE_VIEW_SIGN_SALT
        generateValue: true

databases:
  - type: postgres
    name: insightnest-db
    databaseName: insightnest_beta
    user: insightnest_user
    plan: starter
    ipAllowList: []
